<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found — brainstorm.org</title>
  <link rel="icon" href="/static/img/cube-favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <!-- Static fallback for nginx error_page 404. Django template: liveblog_project/templates/errors/404.html -->
  <style>
    :root { --bg:#ffffff; --text:#1f2328; --muted:#6c757d; --primary:#273c75; --border:#e6e6e6; --card-shadow:0 3px 12px rgba(0,0,0,.08); }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0d1117; --text:#e6edf3; --muted:#8b949e; --primary:#58a6ff; --border:#30363d; --card-shadow:0 3px 12px rgba(0,0,0,.35); }
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { max-width: 40rem; width: 100%; padding: 2rem 1.75rem; border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--card-shadow); text-align: center; }
    .brand { font-family: "Space Grotesk", sans-serif; font-size: 0.9rem; margin-bottom: 1rem; }
    .brand a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .brand a:hover { text-decoration: underline; }
    .code { font-family: "Space Grotesk", sans-serif; font-size: clamp(3rem, 10vw, 4.5rem); font-weight: 700; margin: 0 0 0.5rem; color: var(--muted); letter-spacing: -0.05em; line-height: 1; }
    h1 { font-family: "Space Grotesk", sans-serif; font-size: 1.35rem; font-weight: 600; margin: 0 0 0.75rem; }
    p.lead { margin: 0 0 1.5rem; color: var(--muted); line-height: 1.65; font-size: 1rem; }
    .actions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    a.btn { display: inline-block; padding: 0.65rem 1.25rem; border-radius: 8px; font-weight: 500; text-decoration: none; font-size: 1rem; }
    a.btn-primary { background: #273c75; color: #fff; border: 1px solid #273c75; }
    a.btn-primary:hover { background: #1e2f5c; border-color: #1e2f5c; }
    a.btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--border); }
    a.btn-outline:hover { border-color: var(--primary); }
    @media (max-width: 480px) { .actions { flex-direction: column; } a.btn { width: 100%; text-align: center; } }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand"><a href="/">brainstorm.org</a></p>
    <p class="code" aria-hidden="true">404</p>
    <h1>Page not found</h1>
    <p class="lead">This address may have changed or contain a typo. Check the URL or go to the home page.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Home</a>
      <a class="btn btn-outline" href="/blog/brainews/">BraiNews</a>
    </div>
  </div>
</body>
</html>
