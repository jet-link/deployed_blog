# Upstream Gunicorn (user service) — after SSL, Certbot edits this file; re-merge proxy if needed
map $http_x_forwarded_proto $forwarded_scheme {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

upstream liveblog_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name brainstorm.news www.brainstorm.news 161.35.19.91;

    client_max_body_size 50M;

    location / {
        proxy_pass http://liveblog_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_redirect off;
    }
}
