<header class="admin-header">
    <div class="admin-header-left">
        <button type="button" class="admin-menu-toggle" id="adminMenuToggle" aria-label="Open menu" aria-expanded="false">☰</button>
        <h1 class="admin-page-title">{% block page_title %}brainstorm.org{% endblock %}</h1>
        <span class="admin-online-badge">Online: {{ admin_online_count|default:0 }} {% if admin_online_count == 1 %}user{% else %}users{% endif %}</span>
    </div>
    <div class="admin-header-right">
        <button type="button" class="admin-theme-toggle" id="adminThemeToggle" aria-label="Toggle theme" title="Toggle light/dark theme"><i class="admin-theme-icon fa-regular fa-moon" aria-hidden="true"></i></button>
        <a href="{% url 'login_app:profile' username=request.user.username %}" class="admin-button admin-button-sm">Go to site</a>
    </div>
</header>
