<div class="modal fade" id="genPassModal" tabindex="-1" aria-labelledby="genPassModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header d-flex align-items-center justify-content-between">
        <h5 class="modal-title text-muted fw-normal" id="genPassModalLabel">Generated password</h5>
        <button type="button" class="modal-close-btn" data-bs-dismiss="modal" aria-label="Close">×</button>
      </div>

      <div class="modal-body text-center">
        <div class="border rounded p-3">
          <strong id="generatedPassword" class="fs-5" style="word-break:break-all;"></strong>
        </div>

        <div class="d-flex gap-1 mt-3">
          <button id="copyPassBtn" type="button" class="cstm-btn custom-primary-btn w-50">Copy</button>
          <button id="usePassBtn" type="button" class="cstm-btn custom-primary-btn w-50">Use this password</button>
        </div>
      </div>
    </div>
  </div>
</div>
