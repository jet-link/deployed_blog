{% load static %}
{% load counters %}
<div class="hero-snap">
  {% for item in popular_items %}
    <article class="hero-card">
      {% with im=item.images.all|first %}
      {% if im %}
        <img src="{{ im.get_thumbnail_url }}" alt="thumbnail" loading="lazy" width="300" height="200" />
      {% else %}
        <img src="{% static 'img/no_image.jpg' %}" alt="thumbnail" />
      {% endif %}
      {% endwith %}
      <div class="d-flex hero-card-body flex-column">
        <h5 class="m-0">{{ item.title }}</h5>
        <hr />
        <div class="d-flex justify-content-between align-items-center">
          <a href="{{ item.get_absolute_url }}?from=home&amp;source_url=/" >Read more →</a>
          <div class="d-flex gap-2 small">
            <span id="likes-count-{{ item.pk }}">
              {{ item.likes_count|human }}
            </span>
             <span> <i class="fa fa-heart danger_"></i></span>
          </div>
        </div>
      </div>
    </article>
  {% endfor %}
</div>
