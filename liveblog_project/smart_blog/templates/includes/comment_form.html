{% load extras %}
{% if user.is_authenticated %}
  {% if user|user_shadow_banned %}
    <div class="p-0">
      <div class="d-inline-flex custom-alert custom-alert-danger">
        <span class="small" title="You have been shadow banned">You have been shadow banned. Improve your trust score to restore access.</span>
      </div>
    </div>
  {% else %}
    <div class="pt-4">
      <div class="d-inline-flex gap-2 align-items-center">
        <h6 class="text-muted m-0">Leave a comment</h6>
        <button type="button" class="comment-form-btn">
          <i class="fa fa-angle-down"></i>
          <i class="fa fa-angle-up hidden"></i>
        </button>
      </div>
      <small class="text-muted hidden" title="Max 500 characters.">(Max 500 chars)</small>
    </div>
    <div id="commentFormBody" class="comment-form-body hidden">
      <form id="commentForm" action="{% url 'smart_blog:add_comment' item.slug %}" method="post" novalidate data-validate="true" data-ajax="true" data-item-id="{{ item.pk }}" data-user-id="{{ user.pk }}" data-trust-status-url="{% url 'login_app:api_trust_status' %}" class="pb-4">
        {% csrf_token %}

        <div id="commentFormErrors" class="mb-2"></div>

        <div class="form-floating mb-2">
          {{ form.text }}
          <label for="id_comment_text" class="text-muted comment-label">Comment text</label>
        </div>

        <button id="submitCommentBtn" type="submit" class="cstm-btn-sm custom-primary-btn comment-btn">Comment</button>
        <button id="clearComment" type="button" class="cstm-btn-sm custom-primary-btn hidden" aria-label="Clear comment">Clr</button>
      </form>
    </div>
  {% endif %}
{% endif %}
