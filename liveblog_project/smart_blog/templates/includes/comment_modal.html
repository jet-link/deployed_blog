<div class="modal fade" id="confirmDeleteModal" data-item-id="{{ item.pk }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header d-flex align-items-center justify-content-between">
        <h5 class="modal-title text-muted" id="confirmDeleteModalLabel">Removing...</h5>
        <button type="button" class="modal-close-btn" data-bs-dismiss="modal" aria-label="Close">×</button>
      </div>
      <div class="modal-body">Are you sure you want remove the comment?</div>
      <div class="modal-footer">
        <button type="button" class="cstm-btn custom-secondary-btn cstm-btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button id="confirmDeleteBtn" type="button" class="cstm-btn custom-danger-btn cstm-btn-sm">Remove</button>
      </div>
    </div>
  </div>
</div>
