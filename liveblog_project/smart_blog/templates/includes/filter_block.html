{% if user.is_authenticated %}
  <div class="filter-block d-flex gap-2 align-items-center filter-block--scrollable" data-filter-url="{% url 'smart_blog:items_filtered' %}">
    <div class="filter-select d-flex flex-nowrap filter-scroll-x" id="filterReasonList">
      <button type="button" class="filter-reason-btn" data-filter="liked">Liked</button>
      <button type="button" class="filter-reason-btn" data-filter="bookmarked">Marked</button>
    </div>
  </div>
{% endif %}
