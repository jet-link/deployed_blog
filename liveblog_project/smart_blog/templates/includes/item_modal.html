<div class="modal" id="confirmItemDeleteModal-{{ item.pk }}" tabindex="-1" aria-labelledby="confirmDeleteModalLabel-{{ item.pk }}" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <!-- Form in modal: works without JS; primary path uses native submit -->
      <form method="post" action="{% url 'smart_blog:delete_post' item.slug %}" data-delete-post="1">
        {% csrf_token %}
        <input type="hidden" name="redirect_to" class="delete-redirect" value="" />
        <div class="modal-header d-flex align-items-center justify-content-between">
          <h5 class="modal-title text-muted" id="confirmDeleteModalLabel-{{ item.pk }}">Removing...</h5>
          <button type="button" class="modal-close-btn" data-bs-dismiss="modal" aria-label="Close">×</button>
        </div>

        <div class="modal-body">
          Are you sure you want to remove post <span class="text-danger fw-semibold">{{ item.title }}</span> ?
          {% comment %} <p class="small text-muted mb-0">This action cannot be undone.</p> {% endcomment %}
        </div>

        <div class="modal-footer">
          <button type="button" class="cstm-btn custom-secondary-btn cstm-btn-sm" data-bs-dismiss="modal">Cancel</button>
          <!-- Native submit → POST delete_post -->
          <button type="submit" class="cstm-btn custom-danger-btn cstm-btn-sm">Remove</button>
        </div>
      </form>
    </div>
  </div>
</div>
