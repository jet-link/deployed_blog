{# Circular ⋮ trigger for post/comment overflow menus; requires .comment-menu parent + JS .comment-menu-btn #}
<button type="button" class="comment-menu-btn overflow-more-btn" aria-label="{{ aria_label|default:'More actions' }}" aria-expanded="false" aria-haspopup="true">
  <span class="overflow-more-btn__dots" aria-hidden="true">
    <span class="overflow-more-btn__dot"></span>
    <span class="overflow-more-btn__dot"></span>
    <span class="overflow-more-btn__dot"></span>
  </span>
</button>
