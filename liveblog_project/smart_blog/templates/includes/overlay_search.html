<div id="overlaySearchRoot" aria-hidden="true" class="overlay-search-root hidden">
  <div class="overlay-backdrop" id="overlaySearchBackdrop" role="presentation"></div>
  <div class="overlay-panel" role="dialog" aria-modal="true" aria-labelledby="overlaySearchDialogTitle">
    <div id="overlaySearchContent" class="overlay-search-content">
      <div class="overlay-search-topbar">
        <h2 id="overlaySearchDialogTitle" class="overlay-search-dialog-title">Search</h2>
        <button type="button" id="overlaySearchCloseToolbar" class="overlay-search-close-text btn btn-link text-muted text-decoration-none">
          Close
        </button>
      </div>
      <div class="overlay-search-input-wrap">
        <div class="header-search-row position-relative">
          <span class="search-sign"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input id="overlaySearchInput" class="header-search-input form-control" type="search" placeholder="What are you looking for?" autocomplete="off" aria-label="Search" aria-controls="overlaySearchSuggestions overlaySearchHistory" />
          <button id="overlaySearchClear" type="button" class="header-search-clear field-clear btn btn-link p-0 hidden" data-target="#overlaySearchInput" aria-label="Clear search"><i class="fa fa-times" aria-hidden="true"></i></button>
        </div>
      </div>
      <div class="overlay-search-body">
        <section id="overlaySearchSuggestionsSection" class="overlay-search-section" hidden>
          <h3 class="overlay-search-section-heading">Suggestions</h3>
          <div id="overlaySearchSuggestions" class="overlay-search-suggestions" role="listbox" aria-label="Suggested posts"></div>
        </section>
        <section id="overlaySearchHistorySection" class="overlay-search-section">
          <h3 class="overlay-search-section-heading">Recent searches</h3>
          <div id="overlaySearchHistory" class="overlay-search-history"></div>
        </section>
      </div>
    </div>
  </div>
</div>

<button type="button" id="floatingSearchBtn" class="floating-search-btn" aria-label="Open search">
  <i class="fa fa-search floating-search-icon" aria-hidden="true"></i>
</button>
