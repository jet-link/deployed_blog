<div id="overlaySearchRoot" aria-hidden="true" class="overlay-search-root hidden">
  <div class="overlay-backdrop" id="overlaySearchBackdrop"></div>
  <div class="overlay-panel" role="dialog" aria-modal="true" aria-label="Search overlay">
    <div id="overlaySearchContent" class="overlay-search-content"></div>
  </div>
  <button id="overlayCloseBtn" class="overlay-close" aria-label="Close search"><i class="fa fa-times"></i></button>
</div>

<button type="button" id="floatingSearchBtn" class="floating-search-btn" aria-label="Open search">
  <i class="fa fa-search floating-search-icon" aria-hidden="true"></i>
</button>
