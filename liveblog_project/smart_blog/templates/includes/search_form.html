<!-- templates/includes/search_form.html -->
<div id="headerSearchOverlay" class="header-search-overlay">
  <div class="header-search-inner" id="headerSearchSticky">
    <div class="header-search-row position-relative">
      <input id="headerSearchInput" class="header-search-input form-control" type="search" placeholder="What are you looking for?" aria-label="Search" />
      <span class="search-sign"><i class="fa fa-search"></i></span>
      <!-- Clear button: data-target points to the input -->
      <button id="headerSearchClear" type="button" class="header-search-clear field-clear btn btn-link p-0 hidden" data-target="#headerSearchInput" aria-label="Clear search"><i class="fa fa-times" aria-hidden="true"></i></button>
    </div>
    <!-- Search history (BraiNews); opens when input is focused -->
    <div id="searchHistoryDropdown" class="search-history-dropdown hidden" aria-hidden="true"></div>
  </div>
</div>
