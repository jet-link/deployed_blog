{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block title %}Editor playground{% endblock %}

{% block body_class %}editor-playground-page{% endblock %}

{% block content %}
  <div class="container-main content_block editor-playground">
    <header class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
      <h1 class="h5 mb-0">Post Studio — Editor.js playground</h1>
      <span id="editor-playground-status" class="small text-muted flex-shrink-0" aria-live="polite">Starting…</span>
    </header>

    <div class="editor-playground__stack">
      <div class="editor-playground__canvas card shadow-sm">
        <div
          id="editor-playground-top-toolbar"
          class="editor-playground__top-toolbar"
          role="toolbar"
          aria-label="{% trans 'Post editor formatting' %}"
        >
          <input type="file" accept="image/*" hidden data-ps-image-input="1" aria-hidden="true" />

          <div class="editor-playground__toolbar-group" role="group" aria-label="{% trans 'History' %}">
            <button type="button" class="ps-toolbar-btn" data-ps-action="undo" title="Undo (Ctrl+Z)" aria-keyshortcuts="Ctrl+Z">↶</button>
            <button type="button" class="ps-toolbar-btn" data-ps-action="redo" title="Redo (Ctrl+Y)" aria-keyshortcuts="Ctrl+Y">↷</button>
          </div>
          <span class="editor-playground__toolbar-sep" aria-hidden="true"></span>

          <div class="editor-playground__toolbar-group" role="group" aria-label="{% trans 'Inline' %}">
            <button type="button" class="ps-toolbar-btn ps-toolbar-btn--abbr" data-ps-cmd="bold" title="Bold">B</button>
            <button type="button" class="ps-toolbar-btn ps-toolbar-btn--abbr" data-ps-cmd="italic" title="Italic"><i>I</i></button>
            <button type="button" class="ps-toolbar-btn ps-toolbar-btn--abbr" data-ps-cmd="underline" title="Underline"><u>U</u></button>
            <button type="button" class="ps-toolbar-btn" data-ps-cmd="link" title="{% trans 'Link' %}">🔗</button>
            <button type="button" class="ps-toolbar-btn" data-ps-cmd="unlink" title="{% trans 'Remove link' %}">⊗</button>
            <button type="button" class="ps-toolbar-btn" data-ps-cmd="marker" title="{% trans 'Marker' %}">M</button>
            <button type="button" class="ps-toolbar-btn ps-toolbar-btn--abbr" data-ps-cmd="inlineCode" title="{% trans 'Inline code' %}">&lt;/&gt;</button>
          </div>
          <span class="editor-playground__toolbar-sep" aria-hidden="true"></span>

          <div class="editor-playground__toolbar-group" role="group" aria-label="{% trans 'Headings' %}">
            <button type="button" class="ps-toolbar-btn" data-ps-header="2" title="Heading 2">H2</button>
            <button type="button" class="ps-toolbar-btn" data-ps-header="3" title="Heading 3">H3</button>
            <button type="button" class="ps-toolbar-btn" data-ps-header="4" title="Heading 4">H4</button>
          </div>
          <span class="editor-playground__toolbar-sep" aria-hidden="true"></span>

          <div class="editor-playground__toolbar-group" role="group" aria-label="{% trans 'Lists' %}">
            <button type="button" class="ps-toolbar-btn" data-ps-block="list-unordered" title="{% trans 'Bulleted list' %}">•</button>
            <button type="button" class="ps-toolbar-btn" data-ps-block="list-ordered" title="{% trans 'Numbered list' %}">1.</button>
            <button type="button" class="ps-toolbar-btn" data-ps-block="list-checklist" title="{% trans 'Checklist' %}">☑</button>
          </div>
          <span class="editor-playground__toolbar-sep" aria-hidden="true"></span>

          <div class="editor-playground__toolbar-group" role="group" aria-label="{% trans 'Insert' %}">
            <button type="button" class="ps-toolbar-btn" data-ps-block="quote" title="{% trans 'Quote' %}">“</button>
            <button type="button" class="ps-toolbar-btn" data-ps-block="warning" title="{% trans 'Callout' %}">!</button>
            <button type="button" class="ps-toolbar-btn" data-ps-block="delimiter" title="{% trans 'Divider' %}">—</button>
            <button type="button" class="ps-toolbar-btn" data-ps-block="image-pick" title="{% trans 'Image' %}">🖼</button>
          </div>
        </div>

        <div class="card-body editor-playground__scroll editor-playground__canvas-body">
          <div id="editorjs" class="editor-playground__holder"></div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script src="{% static 'smart_blog/js/post_studio/editor_playground.bundle.js' %}" defer></script>
{% endblock %}
