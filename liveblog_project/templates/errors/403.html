{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function(){try{var t=localStorage.getItem('themeToggle');document.documentElement.setAttribute('data-theme',t==='sun'?'dark':'light');}catch(e){}}());
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forbidden — brainstorm.news</title>
  <link rel="icon" type="image/svg+xml" href="{% static 'admin/favicon-cube.svg' %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/reset.css' %}" />
  <link rel="stylesheet" href="{% static 'css/public-breakpoints.css' %}" />
  <link rel="stylesheet" href="{% static 'smart_blog/css/tokens.css' %}" />
  <link rel="stylesheet" href="{% static 'smart_blog/css/styles.css' %}" />
  <link rel="stylesheet" href="{% static 'pages/css/pages.css' %}" />
</head>
<body class="error-page">
  <main class="main">
    <section class="error-page-section">
      <div class="container-main">
        <div class="error-page-card error-page-card--denied">
          <p class="error-page-brand">
            <a href="{% url 'pages:home' %}" class="error-page-brand-link">brainstorm.news</a>
          </p>
          <p class="error-page-code error-page-code--denied" aria-hidden="true">403</p>
          <h1 class="error-page-title">Access denied</h1>
          <p class="error-page-lead">
            You do not have permission to view this content.
            Try signing in or return to the home page.
          </p>
          <div class="error-page-actions">
            <a href="{% url 'pages:home' %}" class="cstm-btn-sm custom-primary-btn">Home</a>
            {% if not user.is_authenticated %}
              <a href="{% url 'login_app:login' %}" class="cstm-btn-sm custom-secondary-btn">Sign in</a>
            {% else %}
              <button type="button" class="cstm-btn-sm custom-secondary-btn" onclick="window.history.back()">Go back</button>
            {% endif %}
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
