{% if user.is_authenticated %}
<div class="modal fade" id="signoutConfirmModal" tabindex="-1" aria-labelledby="signoutConfirmModalLabel" aria-hidden="true" data-logout-url="{% url 'login_app:logout' %}">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header d-flex align-items-center justify-content-between">
        <h5 class="modal-title text-muted" id="signoutConfirmModalLabel">Sign out</h5>
        <button type="button" class="modal-close-btn" data-bs-dismiss="modal" aria-label="Close">×</button>
      </div>
      <div class="modal-body">Are you sure you want to sign out?</div>
      <div class="modal-footer">
        <button type="button" class="cstm-btn custom-secondary-btn cstm-btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="cstm-btn custom-danger-btn cstm-btn-sm" id="signoutConfirmBtn">Sign out</button>
      </div>
    </div>
  </div>
</div>
{% endif %}
